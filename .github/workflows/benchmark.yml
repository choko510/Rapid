name: benchmark

on:
  push:
    branches: [ benchmarking, main ]
  pull_request:
    branches: [ benchmarking, main ]
  workflow_dispatch:

env:
  FORCE_COLOR: 2

jobs:
  benchmark:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18]

    steps:
    - uses: actions/checkout@v6
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.11.0
        run_install: false
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: pnpm
    - run: pnpm install --frozen-lockfile
    - name: Install Python dependencies
      run:
        python -m pip install -r scripts/requirements.txt
    - run: pnpm run all
    - name: Unzip canned data files
      uses: montudor/action-zip@v1
      with:
        args: unzip -qq test/benchmark/tokyo_canned_data.zip -d test/benchmark
    - name: Install Playwright dependencies
      run:
        pnpm exec playwright install
    - name: Start Server
      run: python scripts/server.py &
    - name: Run Chromium Benchmarks
      continue-on-error: ${{ !(github.ref == 'refs/heads/benchmarking' || github.base_ref == 'benchmarking') }}
      env:
        RAPID_PERF_GUARDRAILS: ${{ (github.ref == 'refs/heads/benchmarking' || github.base_ref == 'benchmarking') && '1' || '0' }}
      run:
        pnpm exec playwright test --config=test/benchmark/playwright.config.mjs --project chromium
    - name: Run Firefox Benchmarks
      if: ${{ github.ref == 'refs/heads/benchmarking' || github.base_ref == 'benchmarking' }}
      env:
        RAPID_PERF_GUARDRAILS: '1'
      run:
        pnpm exec playwright test --config=test/benchmark/playwright.config.mjs --project firefox
    - name: Run Webkit Benchmarks
      if: ${{ github.ref == 'refs/heads/benchmarking' || github.base_ref == 'benchmarking' }}
      env:
        RAPID_PERF_GUARDRAILS: '1'
      run:
        pnpm exec playwright test --config=test/benchmark/playwright.config.mjs --project webkit
    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results-${{ github.run_id }}
        path: test/benchmark/test/benchmark/test-results.json
        if-no-files-found: warn
